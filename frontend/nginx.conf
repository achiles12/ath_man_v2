server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Route all requests to index.html so React Router handles client-side navigation
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for the entry point so deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache hashed static assets aggressively — Vite fingerprints filenames on build
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
